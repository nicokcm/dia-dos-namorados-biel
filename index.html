<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Biel ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
}

h1{
font-size:3rem;
margin-bottom:20px;
}

p{
font-size:1.2rem;
line-height:1.8;
margin-bottom:30px;
}

button{
background:#ff4d8d;
border:none;
padding:15px 30px;
border-radius:30px;
font-size:1rem;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>Para Biel ❤️</h1>

<p>
Algumas histórias começam de repente.<br>
A nossa começou muito antes de nós imaginarmos.
</p>

<button onclick="alert('Bem-vindo à nossa história ❤️')">
Entrar
</button>

</div>

</body>
</html>
